<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bulkmeter</title>
  <meta name="description" content="Track your bulk from 70kg to 75kg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- ============ DASHBOARD ============ -->
    <main id="screen-dashboard" class="screen active">
      <header class="app-header">
        <div class="header-row">
          <h1 class="logo">BULKMETER</h1>
          <div class="streak-badge" id="streak-badge">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
            <span id="streak-count">0</span>
          </div>
        </div>
      </header>

      <div class="content">
        <!-- Weight Card -->
        <section class="card weight-card" id="weight-card">
          <div class="wv" id="current-weight">—</div>
          <div class="wu">kg</div>
          <div class="wm">
            <span>Target: 75 kg</span>
            <span id="weight-diff"></span>
          </div>
          <div class="wtrack"><div class="wfill" id="weight-progress"></div></div>
        </section>

        <!-- Weight Chart -->
        <section class="card">
          <div class="cr">
            <h2 class="ct">Weight</h2>
            <button class="bi" id="add-weight-btn" aria-label="Log weight">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
          <div class="cw"><canvas id="weight-chart" height="160"></canvas></div>
        </section>

        <!-- Tasks Card -->
        <section class="card">
          <div class="cr" id="tasks-toggle" style="cursor:pointer">
            <h2 class="ct">
              <svg class="cc" id="tasks-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              Today
            </h2>
            <span class="ts" id="task-summary"></span>
          </div>
          <div class="tcol" id="tasks-collapsible">
            <div class="ds" id="day-selector">
              <button class="do" data-day="upper">Upper</button>
              <button class="do" data-day="legs">Legs</button>
              <button class="do" data-day="core">Core+Rest</button>
            </div>
            <div class="tl" id="task-list"></div>
          </div>
        </section>

        <!-- Workout Buttons -->
        <div class="wg">
          <button class="wb" data-workout="upper">
            <span class="wbl">Upper Body</span>
            <span class="wbs">18 sets</span>
          </button>
          <button class="wb" data-workout="legs">
            <span class="wbl">Legs</span>
            <span class="wbs">14 sets</span>
          </button>
          <button class="wb" data-workout="core">
            <span class="wbl">Core</span>
            <span class="wbs">5 sets</span>
          </button>
        </div>
      </div>
    </main>

    <!-- ============ WORKOUT SCREEN ============ -->
    <main id="screen-workout" class="screen">
      <div class="whdr">
        <button class="wback" id="workout-back" aria-label="Back">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h2 class="wtitle" id="workout-title"></h2>
        <div class="wspc"></div>
      </div>

      <div class="wbody" id="workout-body">
        <!-- Content swaps between exercise and rest here -->
      </div>

      <div class="wprog">
        <div class="pt"><div class="pf" id="wo-progress-fill"></div></div>
        <span class="wp" id="wo-progress-text">0 / 0</span>
      </div>
    </main>

    <!-- ============ MODALS ============ -->
    <div class="modal" id="weight-modal" style="display:none">
      <div class="modal-card" onclick="event.stopPropagation()">
        <h3 class="modal-h">Log Weight</h3>
        <div class="ig">
          <input type="number" step="0.1" id="weight-input" placeholder="70.0" autofocus>
          <span class="is">kg</span>
        </div>
        <div class="ma">
          <button class="b2" id="weight-cancel">Cancel</button>
          <button class="b1" id="weight-save">Save</button>
        </div>
      </div>
    </div>

    <div class="modal" id="complete-modal" style="display:none">
      <div class="modal-card" onclick="event.stopPropagation()">
        <div class="micon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h3 class="modal-h">Done!</h3>
        <p class="msub" id="complete-sub"></p>
        <button class="b1" id="complete-done">Back</button>
      </div>
    </div>

  </div>
  <script src="js/app.js"></script>
</body>
</html>
